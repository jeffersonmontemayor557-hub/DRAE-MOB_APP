<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRAE Theoretical Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4 landscape;
        margin: 10mm;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #fff;
        font-family: "Open Sans", Arial, sans-serif;
        color: #111;
      }
      .page {
        width: 297mm;
        min-height: 210mm;
        margin: 0 auto;
        padding: 8mm;
        background: #fff;
      }
      .figure-title {
        font-size: 17px;
        margin: 0 0 8px;
        line-height: 1.35;
      }
      .figure-title b { font-weight: 700; }
      .frame {
        border: 2px solid #1e4d1d;
        padding: 12px;
      }
      svg { width: 100%; height: auto; display: block; }
      .shape {
        fill: #f5f5f5;
        stroke: #2a2a2a;
        stroke-width: 1.4;
      }
      .title { font-size: 12px; fill: #111; font-weight: 600; }
      .body { font-size: 11px; fill: #111; }
      .conn {
        font-size: 10.5px;
        fill: #111;
        font-weight: 600;
      }
      .arrow {
        stroke: #111;
        stroke-width: 1.2;
        fill: none;
        marker-end: url(#arr);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <p class="figure-title">
        <b>Figure 4.</b> The Theoretical Framework of the Development of a DRAE-Based Integrated
        Disaster Response System
      </p>
      <div class="frame">
        <svg viewBox="0 0 1400 860" aria-label="DRAE theoretical framework diagram">
          <defs>
            <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0,8 3,0 6" fill="#111" />
            </marker>
          </defs>

          <!-- Center stack -->
          <rect class="shape" x="580" y="16" rx="18" ry="18" width="240" height="104" />
          <text class="body" x="700" y="44" text-anchor="middle">DRAE Mobile + Admin Web</text>
          <text class="body" x="700" y="64" text-anchor="middle">Integrated Monitoring, Reporting,</text>
          <text class="body" x="700" y="84" text-anchor="middle">and Response System for Dasmariñas City</text>

          <rect class="shape" x="580" y="146" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="178" text-anchor="middle">User & Access Management</text>

          <rect class="shape" x="580" y="216" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="248" text-anchor="middle">Profile Management Module</text>

          <rect class="shape" x="580" y="286" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="318" text-anchor="middle">Incident Reporting Module</text>

          <rect class="shape" x="580" y="356" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="388" text-anchor="middle">Assignment & Dispatch Module</text>

          <rect class="shape" x="580" y="426" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="458" text-anchor="middle">Advisory & Hotline Module</text>

          <rect class="shape" x="580" y="496" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="528" text-anchor="middle">Readiness & Tracking Module</text>

          <rect class="shape" x="580" y="566" rx="12" ry="12" width="240" height="52" />
          <text class="title" x="700" y="598" text-anchor="middle">Admin Governance Module</text>

          <!-- Left actor -->
          <rect class="shape" x="80" y="214" rx="20" ry="20" width="250" height="380" />
          <text class="title" x="205" y="260" text-anchor="middle">Resident / User</text>
          <text class="body" x="205" y="296" text-anchor="middle">- Log in / Sign up</text>
          <text class="body" x="205" y="324" text-anchor="middle">- Complete profile</text>
          <text class="body" x="205" y="352" text-anchor="middle">- Submit incidents</text>
          <text class="body" x="205" y="380" text-anchor="middle">- View advisories</text>
          <text class="body" x="205" y="408" text-anchor="middle">- Readiness checklist</text>
          <text class="body" x="205" y="436" text-anchor="middle">- Track own reports</text>

          <!-- Right actor -->
          <rect class="shape" x="1060" y="204" rx="20" ry="20" width="250" height="390" />
          <text class="title" x="1185" y="252" text-anchor="middle">Staff / Admin</text>
          <text class="body" x="1185" y="288" text-anchor="middle">- Staff assignments</text>
          <text class="body" x="1185" y="316" text-anchor="middle">- Update report status</text>
          <text class="body" x="1185" y="344" text-anchor="middle">- Monitor dashboards</text>
          <text class="body" x="1185" y="372" text-anchor="middle">- Manage residents/staff</text>
          <text class="body" x="1185" y="400" text-anchor="middle">- Post advisories/hotlines</text>
          <text class="body" x="1185" y="428" text-anchor="middle">- Superadmin RBAC control</text>

          <!-- Database -->
          <ellipse class="shape" cx="700" cy="760" rx="180" ry="40" />
          <path class="shape" d="M520 760 v44 c0 18 360 18 360 0 v-44" fill="none" />
          <text class="title" x="700" y="764" text-anchor="middle">Supabase Database</text>
          <text class="body" x="700" y="784" text-anchor="middle">auth.users, profiles, staff_members, incident_reports, app_admins</text>

          <!-- Vertical arrows -->
          <path class="arrow" d="M700 120 L700 146" />
          <path class="arrow" d="M700 198 L700 216" />
          <path class="arrow" d="M700 268 L700 286" />
          <path class="arrow" d="M700 338 L700 356" />
          <path class="arrow" d="M700 408 L700 426" />
          <path class="arrow" d="M700 478 L700 496" />
          <path class="arrow" d="M700 548 L700 566" />
          <path class="arrow" d="M700 618 L700 720" />

          <!-- Left connectors -->
          <path class="arrow" d="M330 242 L580 242" />
          <text class="conn" x="455" y="232" text-anchor="middle">Authentication</text>

          <path class="arrow" d="M330 312 L580 312" />
          <text class="conn" x="455" y="302" text-anchor="middle">Profile updates</text>

          <path class="arrow" d="M330 382 L580 382" />
          <text class="conn" x="455" y="372" text-anchor="middle">Incident submission</text>

          <path class="arrow" d="M330 452 L580 452" />
          <text class="conn" x="455" y="442" text-anchor="middle">Readiness tracking</text>

          <path class="arrow" d="M580 522 L330 522" />
          <text class="conn" x="455" y="540" text-anchor="middle">Advisories / hotlines</text>

          <!-- Right connectors -->
          <path class="arrow" d="M1060 312 L820 312" />
          <text class="conn" x="940" y="302" text-anchor="middle">Monitor reports</text>

          <path class="arrow" d="M1060 382 L820 382" />
          <text class="conn" x="940" y="372" text-anchor="middle">Staff action / status</text>

          <path class="arrow" d="M1060 452 L820 452" />
          <text class="conn" x="940" y="442" text-anchor="middle">Admin operations</text>

          <path class="arrow" d="M1060 522 L820 522" />
          <text class="conn" x="940" y="540" text-anchor="middle">Superadmin governance</text>
        </svg>
      </div>
    </div>
  </body>
</html>
